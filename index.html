<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTAGE動画教材 検索 ｜ Bright Up</title>
<meta name="description" content="ハンドメイド販売講座の動画教材をキーワードで検索できる学習ライブラリ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>


:root {
  --cream: #f2ece5;
  --cream-soft: #f8f4ee;
  --cream-deep: #e8dfd2;
  --navy: #1c2c44;
  --navy-deep: #15233a;
  --navy-soft: #2d3f5a;
  --navy-light: #3a4a64;
  --darkred: #660000;
  --darkred-soft: #8b1a1a;
  --mauve: #936c80;
  --mauve-soft: #b08c9e;
  --mauve-pale: #c9a9b8;
  --gold: #b08c50;
  --gold-soft: #c9a96e;
  --line: rgba(28, 44, 68, 0.12);
  --line-strong: rgba(28, 44, 68, 0.25);
  --line-cream: rgba(242, 236, 229, 0.15);
  --line-cream-strong: rgba(242, 236, 229, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--cream);
  color: var(--navy);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  font-weight: 400;
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ========== HERO（ネイビー帯） ========== */
.hero {
  background: var(--navy);
  color: var(--cream);
  position: relative;
  overflow: hidden;
}

/* ボタニカル装飾 */
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(147, 108, 128, 0.18) 0%, transparent 60%);
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(176, 140, 80, 0.10) 0%, transparent 60%);
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 1280px;
  margin: 0 auto;
  padding: 60px 24px 48px;
  text-align: center;
}

.eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.4em;
  color: var(--mauve-pale);
  text-transform: uppercase;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
}

.eyebrow::before, .eyebrow::after {
  content: '';
  width: 50px;
  height: 1px;
  background: var(--mauve-pale);
  opacity: 0.6;
}

h1 {
  font-weight: 700;
  font-size: clamp(28px, 5vw, 44px);
  letter-spacing: 0.05em;
  color: var(--cream);
  margin-bottom: 14px;
  line-height: 1.4;
}

h1 .accent {
  color: var(--gold-soft);
  font-weight: 600;
  font-style: italic;
  margin-left: 6px;
}

.tagline {
  font-size: 14px;
  color: var(--mauve-pale);
  letter-spacing: 0.1em;
  margin-bottom: 38px;
  font-weight: 400;
}

/* SEARCH（ネイビー帯の中） */
.search-box {
  position: relative;
  max-width: 640px;
  margin: 0 auto;
}

.search-input {
  width: 100%;
  padding: 18px 56px 18px 24px;
  font-size: 15px;
  font-family: inherit;
  font-weight: 500;
  background: var(--cream);
  border: 1.5px solid transparent;
  border-radius: 4px;
  color: var(--navy);
  letter-spacing: 0.02em;
  transition: all 0.25s ease;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
}

.search-input::placeholder {
  color: var(--navy-soft);
  opacity: 0.55;
  font-weight: 400;
}

.search-input:focus {
  outline: none;
  border-color: var(--gold-soft);
  background: #fff;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), 0 0 0 3px rgba(176, 140, 80, 0.25);
}

.search-icon {
  position: absolute;
  right: 22px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--navy-soft);
  pointer-events: none;
}

.search-clear {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--navy);
  border: none;
  color: var(--cream);
  cursor: pointer;
  font-size: 18px;
  padding: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.search-clear:hover {
  background: var(--darkred);
}

/* ========== CONTENT（クリーム帯） ========== */

/* CATEGORY FILTER */
.filter-area {
  background: var(--cream);
  padding: 32px 0 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.filter-area::before {
  content: '';
  display: block;
  position: absolute;
  inset: 0;
  background: var(--cream);
  z-index: -1;
}

.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  background: transparent;
  border: 1.5px solid var(--line-strong);
  border-radius: 100px;
  color: var(--navy);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.chip:hover {
  border-color: var(--navy);
  background: rgba(28, 44, 68, 0.05);
}

.chip.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--cream);
  font-weight: 600;
}

.chip .count {
  font-size: 11px;
  opacity: 0.65;
  font-weight: 400;
}

.chip.active .count {
  opacity: 0.85;
}

/* META BAR */
.meta-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 0 28px;
  border-bottom: 1.5px solid var(--line);
  margin-bottom: 32px;
  margin-top: 24px;
}

.result-count {
  font-size: 15px;
  color: var(--navy-soft);
  font-weight: 500;
}

.result-count strong {
  color: var(--darkred);
  font-weight: 700;
  font-size: 20px;
  margin: 0 4px;
}

.sort-info {
  font-size: 11px;
  color: var(--mauve);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
}

/* CARDS GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  padding-bottom: 100px;
}

.card {
  position: relative;
  background: var(--cream-soft);
  border: 1.5px solid var(--line);
  border-radius: 6px;
  padding: 26px 24px 22px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  animation: fadeInUp 0.5s ease backwards;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--navy);
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 0;
}

.card > * {
  position: relative;
  z-index: 1;
}

.card:hover {
  border-color: var(--navy);
  transform: translateY(-4px);
  box-shadow: 0 16px 32px rgba(28, 44, 68, 0.18);
}

.card:hover::before {
  opacity: 1;
}

.card:hover .card-category,
.card:hover .card-title,
.card:hover .card-summary,
.card:hover .keyword-tag,
.card:hover .cta-text {
  color: var(--cream);
}

.card:hover .card-category {
  border-bottom-color: var(--line-cream-strong);
  color: var(--mauve-pale);
}

.card:hover .keyword-tag {
  background: rgba(242, 236, 229, 0.12);
  color: var(--cream);
}

.card:hover .card-cta {
  border-top-color: var(--line-cream-strong);
}

.card:hover .cta-arrow {
  background: var(--gold-soft);
  border-color: var(--gold-soft);
  color: var(--navy);
  transform: translateX(4px);
}

.card-category {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mauve);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  align-self: flex-start;
  transition: all 0.3s ease;
}

.card-title {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.55;
  color: var(--navy);
  margin-bottom: 14px;
  letter-spacing: 0.01em;
  transition: color 0.3s ease;
}

.card-summary {
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--navy-soft);
  margin-bottom: 20px;
  flex: 1;
  font-weight: 400;
  transition: color 0.3s ease;
}

.card-keywords {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.keyword-tag {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  background: var(--cream-deep);
  color: var(--navy);
  border-radius: 100px;
  letter-spacing: 0.05em;
  transition: all 0.3s ease;
}

.card-cta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 14px;
  border-top: 1px solid var(--line);
  transition: border-color 0.3s ease;
}

.cta-text {
  font-size: 12px;
  font-weight: 700;
  color: var(--darkred);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  transition: color 0.3s ease;
}

.cta-arrow {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--darkred);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--darkred);
  transition: all 0.3s ease;
}

.card.no-url {
  cursor: default;
  opacity: 0.55;
}
.card.no-url:hover {
  transform: none;
  border-color: var(--line);
  box-shadow: none;
}
.card.no-url:hover::before { opacity: 0; }
.card.no-url:hover .card-category,
.card.no-url:hover .card-title,
.card.no-url:hover .card-summary,
.card.no-url:hover .keyword-tag,
.card.no-url:hover .cta-text {
  color: var(--mauve);
}
.card.no-url:hover .card-category {
  color: var(--mauve);
  border-bottom-color: var(--line);
}
.card.no-url:hover .card-title { color: var(--navy); }
.card.no-url:hover .card-summary { color: var(--navy-soft); }
.card.no-url:hover .keyword-tag {
  background: var(--cream-deep);
  color: var(--navy);
}
.card.no-url:hover .cta-arrow {
  background: transparent;
  color: var(--mauve);
  border-color: var(--mauve);
  transform: none;
}
.card.no-url .cta-text { color: var(--mauve); }
.card.no-url .cta-arrow {
  border-color: var(--mauve);
  color: var(--mauve);
  border-style: dashed;
}

/* HIGHLIGHTING */
.highlight {
  background: rgba(176, 140, 80, 0.3);
  color: var(--darkred);
  font-weight: 700;
  padding: 0 3px;
  border-radius: 2px;
}

.card:hover .highlight {
  background: rgba(201, 169, 110, 0.4);
  color: var(--gold-soft);
}

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
}

.empty-icon {
  font-size: 48px;
  color: var(--mauve);
  opacity: 0.4;
  margin-bottom: 16px;
  font-weight: 300;
}

.empty-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 10px;
}

.empty-text {
  color: var(--navy-soft);
  font-size: 14px;
}

/* FOOTER（ネイビー） */
footer {
  background: var(--navy);
  color: var(--mauve-pale);
  padding: 50px 24px 40px;
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.15em;
  font-weight: 500;
  margin-top: 40px;
  position: relative;
  overflow: hidden;
}

footer::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 1px;
  background: var(--gold-soft);
  opacity: 0.6;
}

footer .ornament {
  color: var(--gold-soft);
  margin-bottom: 12px;
  font-size: 22px;
  font-weight: 300;
}

/* ANIMATIONS */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:nth-child(1) { animation-delay: 0.04s; }
.card:nth-child(2) { animation-delay: 0.08s; }
.card:nth-child(3) { animation-delay: 0.12s; }
.card:nth-child(4) { animation-delay: 0.16s; }
.card:nth-child(5) { animation-delay: 0.2s; }
.card:nth-child(6) { animation-delay: 0.24s; }
.card:nth-child(n+7) { animation-delay: 0.28s; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .wrapper { padding: 0 16px; }
  .hero-inner { padding: 40px 16px 36px; }
  .filter-area { padding-top: 24px; }
  .search-input { padding: 16px 52px 16px 22px; font-size: 14px; }
  .grid { grid-template-columns: 1fr; gap: 16px; }
  .card { padding: 22px 20px 18px; }
  .meta-bar { flex-direction: column; align-items: flex-start; gap: 8px; padding: 22px 0 22px; }
  .filter-row { gap: 6px; }
  .chip { padding: 7px 14px; font-size: 12px; }
}

@media (max-width: 480px) {
  .eyebrow { font-size: 10px; gap: 10px; letter-spacing: 0.3em; }
  .eyebrow::before, .eyebrow::after { width: 24px; }
  h1 { font-size: 24px; }
  .tagline { font-size: 12.5px; margin-bottom: 28px; }
  .card-title { font-size: 16px; }
}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow">Bright Up · Library</div>
    <h1>動画教材<span class="accent">Search</span></h1>
    <p class="tagline">学びたいことを、キーワードから探す</p>

    <div class="search-box">
      <input type="text" id="searchInput" class="search-input" placeholder="キーワードを入力 — 例：マインド、撮影、リール" autocomplete="off" spellcheck="false">
      <svg class="search-icon" id="searchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21" stroke-linecap="round"/>
      </svg>
      <button class="search-clear" id="searchClear" aria-label="クリア">×</button>
    </div>
  </div>
</div>

<div class="filter-area">
  <div class="wrapper">
    <div class="filter-row" id="filterRow"></div>
  </div>
</div>

<div class="wrapper">

  <div class="meta-bar">
    <div class="result-count" id="resultCount"></div>
    <div class="sort-info">— Updated 2026 —</div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<footer>
  <div class="ornament">⁂</div>
  <div>REBEL MUSES CRAFT · Bright Up Online School</div>
</footer>

<script>
// ========== DATA ==========
let VIDEOS = [];

// data.json を読み込む
async function loadVideos() {
  try {
    const cacheBuster = '?v=' + Date.now();
    const res = await fetch('data.json' + cacheBuster);
    if (!res.ok) throw new Error('データ取得失敗');
    VIDEOS = await res.json();
    buildCategoryFilter();
    renderResults();
  } catch (err) {
    console.error('データ読み込みエラー:', err);
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠</div><div class="empty-title">データを読み込めませんでした</div><div class="empty-text">しばらく時間をおいて再読み込みしてください</div></div>';
  }
}

// ========== STATE ==========
let activeCategory = 'すべて';
let searchQuery = '';

// ========== ELEMENTS ==========
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchIcon = document.getElementById('searchIcon');
const filterRow = document.getElementById('filterRow');
const grid = document.getElementById('grid');
const resultCount = document.getElementById('resultCount');

// ========== HELPERS ==========
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  // Split query into terms (space-separated)
  const terms = query.split(/\s+/).filter(t => t.length > 0).map(escapeRegex);
  if (terms.length === 0) return escaped;
  const pattern = new RegExp('(' + terms.join('|') + ')', 'gi');
  return escaped.replace(pattern, '<span class="highlight">$1</span>');
}

function matchesSearch(video, query) {
  if (!query) return true;
  const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 0);
  const haystack = [
    video.title,
    video.summary,
    video.category,
    ...(video.keywords || [])
  ].join(' ').toLowerCase();
  // All terms must match (AND logic)
  return terms.every(term => haystack.includes(term));
}

function matchesCategory(video, category) {
  if (category === 'すべて') return true;
  return video.category === category;
}

// ========== RENDER ==========
function buildCategoryFilter() {
  const counts = {'すべて': VIDEOS.length};
  VIDEOS.forEach(v => {
    counts[v.category] = (counts[v.category] || 0) + 1;
  });
  // Order categories
  const order = ['すべて', 'マインド', 'ショップ設計基礎', '戦略', 'マルシェ', '商品撮影', 'インスタ', 'minne・creema', 'LP・告知動画'];
  const cats = order.filter(c => counts[c]);
  filterRow.innerHTML = cats.map(cat => `
    <button class="chip ${cat === activeCategory ? 'active' : ''}" data-category="${escapeHtml(cat)}">
      ${escapeHtml(cat)}<span class="count">${counts[cat]}</span>
    </button>
  `).join('');

  filterRow.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeCategory = chip.dataset.category;
      buildCategoryFilter();
      renderResults();
    });
  });
}

function renderResults() {
  const filtered = VIDEOS.filter(v =>
    matchesSearch(v, searchQuery) && matchesCategory(v, activeCategory)
  );

  // Update count
  if (searchQuery || activeCategory !== 'すべて') {
    resultCount.innerHTML = `<strong>${filtered.length}</strong> 件の授業`;
  } else {
    resultCount.innerHTML = `全 <strong>${filtered.length}</strong> 件の授業`;
  }

  // Render cards
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⁂</div>
        <div class="empty-title">該当する授業が見つかりませんでした</div>
        <div class="empty-text">別のキーワードで検索してみてください</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map(v => {
    const hasUrl = v.url && v.url.length > 0;
    const tag = hasUrl ? 'a' : 'div';
    const linkAttrs = hasUrl ? `href="${escapeHtml(v.url)}" target="_blank" rel="noopener"` : '';
    const noUrlClass = hasUrl ? '' : ' no-url';
    return `
    <${tag} ${linkAttrs} class="card${noUrlClass}">
      <span class="card-category">${escapeHtml(v.category)}</span>
      <h3 class="card-title">${highlight(v.title, searchQuery)}</h3>
      <p class="card-summary">${highlight(v.summary, searchQuery)}</p>
      <div class="card-keywords">
        ${(v.keywords || []).map(k => `<span class="keyword-tag">#${highlight(k, searchQuery)}</span>`).join('')}
      </div>
      <div class="card-cta">
        <span class="cta-text">${hasUrl ? '動画を見る' : '準備中'}</span>
        <span class="cta-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
      </div>
    </${tag}>
  `;}).join('');
}

// ========== EVENTS ==========
searchInput.addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  if (searchQuery) {
    searchClear.style.display = 'flex';
    searchIcon.style.display = 'none';
  } else {
    searchClear.style.display = 'none';
    searchIcon.style.display = 'block';
  }
  renderResults();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.style.display = 'none';
  searchIcon.style.display = 'block';
  searchInput.focus();
  renderResults();
});

// Keyboard shortcut: / to focus
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// ========== INIT ==========
loadVideos();
</script>
